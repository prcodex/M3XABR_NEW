<svg width="680" viewBox="0 0 680 770" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">The m3xabr-core query pipeline</title>
<desc id="desc">Seven actors process a user query in sequence: Classifier (Actor 1), Expertise Router (Actor 1.5, new), Expertise Assembler (Actor 2, rewritten), Agent Hub and Retriever in parallel (Actors 3-4), Synthesizer (Actor 5), and Evaluator (Actor 7). New components shown in teal, existing in gray.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #111; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; fill: #555; }
  .gray rect { fill: #f3f4f6; stroke: #9ca3af; }
  .teal rect { fill: #ccfbf1; stroke: #14b8a6; }
  .arr { stroke: #6b7280; stroke-width: 1.5; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<g class="teal"><rect x="500" y="30" width="14" height="14" rx="3"/></g>
<text class="ts" x="520" y="41">New or rewritten</text>

<g class="gray"><rect x="260" y="30" width="160" height="30" rx="6"/></g>
<text class="th" x="340" y="45" text-anchor="middle" dominant-baseline="central">User query</text>
<line x1="340" y1="68" x2="340" y2="92" class="arr" marker-end="url(#arrow)"/>

<g class="gray"><rect x="240" y="100" width="200" height="56" rx="8"/></g>
<text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central">Actor 1 — classifier</text>
<text class="ts" x="340" y="136" text-anchor="middle" dominant-baseline="central">Haiku · query metadata</text>
<line x1="340" y1="164" x2="340" y2="188" class="arr" marker-end="url(#arrow)"/>

<g class="teal"><rect x="240" y="196" width="200" height="56" rx="8"/></g>
<text class="th" x="340" y="214" text-anchor="middle" dominant-baseline="central">Actor 1.5 — router</text>
<text class="ts" x="340" y="232" text-anchor="middle" dominant-baseline="central">Haiku · picks expertises</text>
<line x1="340" y1="260" x2="340" y2="284" class="arr" marker-end="url(#arrow)"/>

<g class="teal"><rect x="240" y="292" width="200" height="56" rx="8"/></g>
<text class="th" x="340" y="310" text-anchor="middle" dominant-baseline="central">Actor 2 — assembler</text>
<text class="ts" x="340" y="328" text-anchor="middle" dominant-baseline="central">File ops · no LLM call</text>

<path d="M 340 356 L 340 372 L 180 372 L 180 380" class="arr" marker-end="url(#arrow)"/>
<path d="M 340 356 L 340 372 L 500 372 L 500 380" class="arr" marker-end="url(#arrow)"/>

<g class="gray"><rect x="80" y="388" width="200" height="56" rx="8"/></g>
<text class="th" x="180" y="406" text-anchor="middle" dominant-baseline="central">Actor 3 — agent hub</text>
<text class="ts" x="180" y="424" text-anchor="middle" dominant-baseline="central">Brazil subset</text>

<g class="gray"><rect x="400" y="388" width="200" height="56" rx="8"/></g>
<text class="th" x="500" y="406" text-anchor="middle" dominant-baseline="central">Actor 4 — retriever</text>
<text class="ts" x="500" y="424" text-anchor="middle" dominant-baseline="central">LanceDB · domain=brazil</text>

<path d="M 180 452 L 180 468 L 340 468 L 340 476" class="arr" marker-end="url(#arrow)"/>
<path d="M 500 452 L 500 468 L 340 468 L 340 476" class="arr" marker-end="url(#arrow)"/>

<g class="gray"><rect x="240" y="484" width="200" height="56" rx="8"/></g>
<text class="th" x="340" y="502" text-anchor="middle" dominant-baseline="central">Actor 5 — synthesizer</text>
<text class="ts" x="340" y="520" text-anchor="middle" dominant-baseline="central">Sonnet · pt-BR response</text>
<line x1="340" y1="548" x2="340" y2="572" class="arr" marker-end="url(#arrow)"/>

<g class="gray"><rect x="240" y="580" width="200" height="56" rx="8"/></g>
<text class="th" x="340" y="598" text-anchor="middle" dominant-baseline="central">Actor 7 — evaluator</text>
<text class="ts" x="340" y="616" text-anchor="middle" dominant-baseline="central">Haiku · PT rubric, regen gate</text>
<line x1="340" y1="644" x2="340" y2="668" class="arr" marker-end="url(#arrow)"/>

<g class="gray"><rect x="240" y="676" width="200" height="30" rx="6"/></g>
<text class="th" x="340" y="691" text-anchor="middle" dominant-baseline="central">Response + score</text>
</svg>
